/* ---------- MODAL ---------- */
let modalSave=null;
function openModal(opts){
  modalSave=opts.onSave;
  const fields=opts.fields.map(fl=>{
    let inp;
    if(fl.type==='textarea')inp='<textarea class="inp" data-k="'+fl.key+'" placeholder="'+esc(fl.placeholder||'')+'">'+esc(fl.value||'')+'</textarea>';
    else if(fl.type==='select')inp='<select class="inp" data-k="'+fl.key+'">'+fl.options.map(o=>'<option value="'+esc(o.v)+'"'+(String(fl.value)===String(o.v)?' selected':'')+'>'+esc(o.l)+'</option>').join('')+'</select>';
    else inp='<input class="inp" data-k="'+fl.key+'" type="'+(fl.type||'text')+'" value="'+esc(fl.value==null?'':fl.value)+'" placeholder="'+esc(fl.placeholder||'')+'"'+(fl.type==='number'?' inputmode="'+(fl.dec?'decimal':'numeric')+'" step="'+(fl.dec?'any':'1')+'"':'')+'>';
    return '<div class="field'+(fl.half?' half':'')+'"><label>'+esc(fl.label)+'</label>'+inp+'</div>';
  });
  // group halves into rows
  let body='';const flds=opts.fields;
  for(let i=0;i<flds.length;i++){
    if(flds[i].half&&flds[i+1]&&flds[i+1].half){body+='<div class="field-row">'+fields[i]+fields[i+1]+'</div>';i++;}
    else body+=fields[i];
  }
  $('#modal-root').innerHTML='<div class="overlay" data-act="modal-bg"><div class="modal"><div class="modal-h"><h3>'+esc(opts.title)+'</h3></div><div class="modal-b">'+body+'</div><div class="modal-f"><button class="btn ghost" data-act="modal-cancel">Cancel</button><button class="btn primary" data-act="modal-ok">'+esc(opts.ok||'Save')+'</button></div></div></div>';
  stripAutofill($('#modal-root'));
  const first=$('#modal-root .inp');if(first)setTimeout(()=>first.focus(),40);
}
function closeModal(){$('#modal-root').innerHTML='';modalSave=null;}
function collectModal(){const vals={};document.querySelectorAll('#modal-root [data-k]').forEach(e=>vals[e.dataset.k]=e.value.trim());return vals;}

/* ---------- TOAST / UNDO ---------- */
let toastT,lastUndo=null;
function toast(msg,undoFn){
  clearTimeout(toastT);
  lastUndo=undoFn||null;
  $('#toast-root').innerHTML='<div class="toast" id="toast">'+esc(msg)+(undoFn?'<button data-act="undo">Undo</button>':'')+'</div>';
  requestAnimationFrame(()=>$('#toast').classList.add('show'));
  toastT=setTimeout(()=>{const el=$('#toast');if(el)el.classList.remove('show');lastUndo=null;},5000);
}

  /* keyed backup restore with confirmation */
  'bak-restore'(el){
    const key=el.dataset.key,date=el.dataset.date;
    $('#modal-root').innerHTML='<div class="overlay" data-act="modal-bg"><div class="modal"><div class="modal-h"><h3>Restore snapshot?</h3></div><div class="modal-b"><p style="font-size:13.5px;margin:0"><b>This replaces everything currently in the app</b> with the snapshot from '+fmtDL(date)+'. Anything added since then will be lost (a fresh snapshot of today is kept).</p></div><div class="modal-f"><button class="btn ghost" data-act="modal-cancel">Cancel</button><button class="btn primary" data-act="bak-confirm" data-key="'+esc(key)+'">Restore</button></div></div></div>';
  },
  'bak-confirm'(el){
    (async()=>{
      try{
        const r=await window.storage.get(el.dataset.key);
        if(!r||!r.value){toast('Snapshot missing');closeModal();return;}
        const obj=JSON.parse(r.value);
        if(!obj||typeof obj!=='object'||!(obj.v||obj.todos)){toast('Snapshot unreadable');return;}
        Store.state=obj;Store.ensure();closeModal();commit();toast('Snapshot restored');
      }catch(e){toast('Couldn\u2019t restore that snapshot');}
    })();
  },

/* ---------- delegation ---------- */
document.addEventListener('click',e=>{
  if(e.target.closest('a[href]'))return;
  // Let native form controls (date pickers, selects, etc.) work even when nested
  // inside a [data-act] container like the modal overlay — don't preventDefault them.
  const ctrl=e.target.closest('input,select,textarea,option');
  const t=e.target.closest('[data-act]');if(!t)return;
  if(ctrl&&t.contains(ctrl)&&ctrl!==t)return;
  const act=t.dataset.act;
  if(actions[act]){e.preventDefault();actions[act](t,e);}
});
document.addEventListener('change',e=>{
  const t=e.target.closest('[data-change]');if(!t)return;
  const act=t.dataset.change;
  if(act==='session-date'&&ui.session){ui.session.date=t.value||todayStr();return;}
  if(act==='set-name'){S().settings.name=t.value.trim();Store.save();render();return;}
  if(act==='debt-extra'){S().debtExtra=Math.max(0,+t.value||0);Store.save();render();return;}
  if(act==='vis-field'&&t.dataset.key){S().vision[t.dataset.key]=t.value.trim();Store.save();return;}
  if(act==='big3-next'){big3Of(todayStr()).next=t.value.trim();Store.save();return;}
  if(act==='rev-field'&&t.dataset.key&&t.dataset.week){const r=S().reviews;if(!r[t.dataset.week])r[t.dataset.week]={};r[t.dataset.week][t.dataset.key]=t.value;Store.save();return;}
  if(act==='nextf'&&t.dataset.k){ui.nextF[t.dataset.k]=t.value;render();return;}
  if(act==='macro-search'){ui.macroSearch=t.value;render();return;}
  if(act==='gweight'&&t.dataset.k){S().settings.goalWeights[t.dataset.k]=Math.max(0,+t.value||0);commit();return;}
  if(act==='sweight'&&t.dataset.k){S().settings.scoreWeights[t.dataset.k]=Math.max(0,+t.value||0);commit();return;}
  if(act==='focus-field'&&t.dataset.key){const ref=focusTask();if(ref&&ref.t){ref.t[t.dataset.key]=t.value;Store.save();}return;}
  if(act==='restore-file'){
    const f=t.files&&t.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{const ta=$('#restore-text');if(ta)ta.value=rd.result;};
    rd.onerror=()=>toast('Couldn\u2019t read that file');
    rd.readAsText(f);
    return;
  }
});
/* drag-to-reorder (pointer events cover mouse + touch) */
let dragCtx=null;
document.addEventListener('pointerdown',e=>{
  const g=e.target.closest('[data-grip]');if(!g)return;
  const row=g.closest('[data-drag-item]');
  const list=g.closest('[data-draglist]');
  if(!row||!list)return;
  dragCtx={row,list,pid:list.dataset.pid};
  row.classList.add('dragging');
  if(g.setPointerCapture){try{g.setPointerCapture(e.pointerId);}catch(err){}}
  e.preventDefault();
});
document.addEventListener('pointermove',e=>{
  if(!dragCtx)return;
  e.preventDefault();
  const others=[...dragCtx.list.querySelectorAll('[data-drag-item]:not(.dragging)')];
  let placed=false;
  for(const el of others){
    const r=el.getBoundingClientRect();
    if(e.clientY<r.top+r.height/2){
      if(dragCtx.row.nextElementSibling!==el)dragCtx.list.insertBefore(dragCtx.row,el);
      placed=true;break;
    }
  }
  if(!placed&&others.length&&dragCtx.list.lastElementChild!==dragCtx.row)dragCtx.list.appendChild(dragCtx.row);
});
function endDrag(){
  if(!dragCtx)return;
  dragCtx.row.classList.remove('dragging');
  const ids=[...dragCtx.list.querySelectorAll('[data-drag-item]')].map(el=>el.dataset.id);
  if(dragCtx.list.dataset.kind==='areas'){
    S().areas.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
    dragCtx=null;commit();return;
  }
  if(dragCtx.list.dataset.wkid){
    const w=S().workouts.find(x=>x.id===dragCtx.list.dataset.wkid);
    if(w&&w.exercises)w.exercises.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
    dragCtx=null;commit();return;
  }
  const p=S().projects.find(x=>x.id===dragCtx.pid);
  if(p&&p.tasks){
    // permute only the visible tasks among their slots; hidden (filtered) tasks stay put
    const idSet=new Set(ids);
    const ordered=ids.map(id=>p.tasks.find(t=>t.id===id)).filter(Boolean);
    let vi=0;
    p.tasks=p.tasks.map(t=>idSet.has(t.id)?ordered[vi++]:t);
  }
  dragCtx=null;
  commit();
}
document.addEventListener('pointerup',endDrag);
document.addEventListener('pointercancel',endDrag);

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const inp=e.target.closest('[data-enter]');
    if(inp){e.preventDefault();const act=inp.dataset.enter;if(actions[act])actions[act](inp,e);return;}
  }
  if(e.key==='Escape'&&ui.tv){exitTV();return;}
  if(e.key==='Escape'&&ui.qaOpen){closeQa();return;}
  if(e.key==='Escape'&&ui.moreOpen){closeMore();return;}
  if(e.key==='Escape'&&$('#modal-root').innerHTML)closeModal();
});

const Sync={
  active:false, db:null, ref:null, uid:null, unsub:null, lastUpdatedAt:0, _t:null,
  init(){
    if(typeof firebase==='undefined'){console.warn('Firebase unavailable — running on this device only');return;}
    try{firebase.initializeApp(FIREBASE_CONFIG);}catch(e){}
    try{this.db=firebase.firestore();}catch(e){this.db=null;}
    if(!this.db)return;
    try{this.db.enablePersistence({synchronizeTabs:true}).catch(function(){});}catch(e){}
    this.buildUI();
    this.showLogin(true);
    const self=this;
    firebase.auth().onAuthStateChanged(function(user){
      if(user){self.hideLogin();self.setStatus('syncing');self.onUser(user);}
      else{self.active=false;if(self.unsub){self.unsub();self.unsub=null;}self.setStatus('');self.showLogin(false);}
    });
  },
  async onUser(user){
    this.uid=user.uid;
    this.email=user.email||'';
    this.ref=this.db.collection('users').doc(user.uid);
    let remote=null;
    try{const snap=await this.ref.get();if(snap.exists)remote=snap.data();}catch(e){}
    const local=S();
    const localTs=+(local.updatedAt||0);
    if(remote&&remote.data){
      let rstate=null;try{rstate=JSON.parse(remote.data);}catch(e){}
      const remoteTs=+(remote.updatedAt||0);
      if(rstate&&remoteTs>=localTs){
        try{await window.storage.set(Store.key+':bak:presync',JSON.stringify(local));}catch(e){}
        this.lastUpdatedAt=remoteTs;
        this.applyRemote(rstate);
      }else{
        await this.pushNow(local);
      }
    }else{
      await this.pushNow(local);
    }
    this.active=true;
    this.attachListener();
    this.setStatus('synced');
  },
  applyRemote(rstate){
    try{Store.state=rstate;Store.ensure();}catch(e){return;}
    try{window.storage.set(Store.key,JSON.stringify(Store.state));}catch(e){}
    try{render();}catch(e){}
  },
  async pushNow(state){
    if(!this.ref)return;
    const ts=+(state.updatedAt||Date.now());
    this.lastUpdatedAt=ts;
    try{await this.ref.set({data:JSON.stringify(state),updatedAt:ts});}catch(e){}
  },
  push(state,json){
    if(!this.active||!this.ref)return;
    const self=this;
    clearTimeout(this._t);
    this._t=setTimeout(function(){
      const ts=+(state.updatedAt||Date.now());
      self.lastUpdatedAt=ts;
      self.ref.set({data:json||JSON.stringify(state),updatedAt:ts}).catch(function(){});
    },500);
  },
  attachListener(){
    if(this.unsub){this.unsub();this.unsub=null;}
    const self=this;
    this.unsub=this.ref.onSnapshot(function(snap){
      if(!snap.exists)return;
      if(snap.metadata&&snap.metadata.hasPendingWrites)return;
      const d=snap.data();const remoteTs=+(d.updatedAt||0);
      if(remoteTs>(self.lastUpdatedAt||0)){
        let rstate=null;try{rstate=JSON.parse(d.data);}catch(e){}
        if(rstate){self.lastUpdatedAt=remoteTs;self.applyRemote(rstate);}
      }
    },function(){});
  },
  login(){this._auth('signInWithEmailAndPassword');},
  signup(){this._auth('createUserWithEmailAndPassword');},
  _auth(method){
    const em=(this._email.value||'').trim(),pw=this._pw.value||'';
    if(!em||!pw){this.err('Enter your email and password.');return;}
    this.err('');this._busy(true);
    const self=this;
    firebase.auth()[method](em,pw).catch(function(e){self._busy(false);self.err(self._msg(e));});
  },
  signOut(){
    if(!confirm('Sign out? Your data stays saved in the cloud and on this device.'))return;
    try{firebase.auth().signOut();}catch(e){}
  },
  skip(){this.hideLogin();this.setStatus('');},
  _msg(e){
    const c=(e&&e.code)||'';
    if(c==='auth/invalid-email')return 'That email doesn’t look right.';
    if(c==='auth/user-not-found'||c==='auth/invalid-credential'||c==='auth/wrong-password')return 'Wrong email or password. First time here? Tap “Create account.”';
    if(c==='auth/email-already-in-use')return 'That email already has an account — tap “Log in” instead.';
    if(c==='auth/weak-password')return 'Password should be at least 6 characters.';
    if(c==='auth/network-request-failed')return 'No internet connection. Connect and try again.';
    return (e&&e.message)||'Something went wrong. Please try again.';
  },
  buildUI(){
    const css=document.createElement('style');
    css.textContent=`
#sync-overlay{position:fixed;inset:0;z-index:1000;background:var(--paper,#F4F0E8);display:none;align-items:center;justify-content:center;padding:24px}
#sync-overlay.show{display:flex}
#sync-overlay .sync-card{width:100%;max-width:360px;background:var(--surface,#fff);border:1px solid var(--line,#e4dccb);border-radius:16px;box-shadow:0 24px 60px -24px rgba(44,42,36,.45);padding:30px 26px;text-align:center}
#sync-overlay .sync-mark{width:48px;height:48px;border-radius:13px;background:var(--sage,#6E7A5A);display:grid;place-items:center;margin:0 auto 18px}
#sync-overlay .sync-mark svg{width:27px;height:27px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#sync-overlay h2{font-family:var(--serif,Georgia,serif);font-weight:600;font-size:22px;margin:0 0 5px;color:var(--ink,#2C2A24)}
#sync-overlay p.sync-sub{margin:0 0 20px;font-size:13.5px;line-height:1.5;color:var(--ink-soft,#6E685C)}
#sync-overlay input{width:100%;border:1px solid var(--line,#e4dccb);background:var(--surface,#fff);border-radius:10px;padding:12px 13px;font-size:16px;margin-bottom:10px;outline:none;color:var(--ink,#2C2A24)}
#sync-overlay input:focus{border-color:var(--sage,#6E7A5A);box-shadow:0 0 0 3px var(--sage-bg,#E9ECDF)}
#sync-overlay .sync-btns{display:flex;gap:9px;margin-top:4px}
#sync-overlay .sync-btns button{flex:1;border-radius:10px;padding:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--sage,#6E7A5A)}
#sync-overlay #sync-login{background:var(--sage,#6E7A5A);color:#fff}
#sync-overlay #sync-signup{background:var(--surface,#fff);color:var(--sage,#6E7A5A)}
#sync-overlay .sync-btns button:disabled{opacity:.55;cursor:default}
#sync-overlay #sync-err{display:none;margin:13px 0 0;font-size:13px;color:var(--clay,#B06A48);line-height:1.45}
#sync-overlay .sync-skip{display:block;margin-top:18px;font-size:12px;color:var(--ink-faint,#9C9483);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%;padding:4px}
#sync-overlay #sync-loading{color:var(--ink-soft,#6E685C);font-size:14px;padding:14px 0}`;
    document.head.appendChild(css);
    const ov=document.createElement('div');
    ov.id='sync-overlay';
    ov.innerHTML=
      '<div class="sync-card">'+
        '<div class="sync-mark"><svg viewBox="0 0 24 24"><path d="M11 20A7 7 0 0 1 4 13c0-6 5-9 16-9 0 8-5 13-9 13z"/><path d="M4 20c3-4 6-6 10-7"/></svg></div>'+
        '<div id="sync-loading">Loading…</div>'+
        '<div id="sync-form">'+
          '<h2>Sign in to Terrain</h2>'+
          '<p class="sync-sub">Log in to sync your data across your phone and computer. First time? Tap “Create account.”</p>'+
          '<input id="sync-email" type="email" inputmode="email" autocomplete="email" placeholder="Email">'+
          '<input id="sync-pw" type="password" autocomplete="current-password" placeholder="Password">'+
          '<div id="sync-err"></div>'+
          '<div class="sync-btns"><button id="sync-login" type="button">Log in</button><button id="sync-signup" type="button">Create account</button></div>'+
          '<button id="sync-skip" class="sync-skip" type="button">Use on this device only</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(ov);
    this._overlay=ov;
    this._email=ov.querySelector('#sync-email');
    this._pw=ov.querySelector('#sync-pw');
    this._errEl=ov.querySelector('#sync-err');
    this._form=ov.querySelector('#sync-form');
    this._loading=ov.querySelector('#sync-loading');
    const self=this;
    ov.querySelector('#sync-login').addEventListener('click',function(){self.login();});
    ov.querySelector('#sync-signup').addEventListener('click',function(){self.signup();});
    ov.querySelector('#sync-skip').addEventListener('click',function(){self.skip();});
    this._pw.addEventListener('keydown',function(e){if(e.key==='Enter')self.login();});
  },
  showLogin(loading){
    if(!this._overlay)return;
    this._overlay.classList.add('show');
    if(this._loading)this._loading.style.display=loading?'block':'none';
    if(this._form)this._form.style.display=loading?'none':'block';
    if(!loading){this._busy(false);this.err('');if(this._pw)this._pw.value='';}
  },
  hideLogin(){if(this._overlay)this._overlay.classList.remove('show');},
  err(m){if(this._errEl){this._errEl.textContent=m||'';this._errEl.style.display=m?'block':'none';}},
  _busy(b){if(this._form)this._form.querySelectorAll('button,input').forEach(function(x){x.disabled=b;});},
  setStatus(s){
    this.status=s||'';
    // if the Settings screen is open, update its account-card status live
    if(ui.view==='settings'){const el=document.getElementById('sync-status-txt');if(el)el.textContent=(s==='synced'?'✓ Synced':(s==='syncing'?'Syncing…':''));}
  }
};
/* ---------- boot ---------- */
(async function(){await Store.load();render();Sync.init();})();
})();
</script>

</style>
<script>
(function(){
  var mm=window.matchMedia&&window.matchMedia('(display-mode: standalone)');
  var standalone=(mm&&mm.matches)||window.navigator.standalone===true;
  if(standalone)return; // already installed — no button needed

  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)||
            (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  var deferred=null;

  var wrap=document.createElement('div');
  wrap.id='pwa-install';
  wrap.innerHTML=
    '<div class="pwa-hint" id="pwa-hint">'+
      '<button class="pwa-x" id="pwa-x" aria-label="Close">×</button>'+
      '<b>Install Terrain</b><br>Tap the Share button '+
      '(the square with an arrow), then choose <b>“Add to Home Screen.”</b>'+
    '</div>'+
    '<button class="pwa-btn" id="pwa-btn" type="button">'+
      '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>'+
      'Install app'+
    '</button>';
  document.body.appendChild(wrap);

  var btn=wrap.querySelector('#pwa-btn');
  var hint=wrap.querySelector('#pwa-hint');
  wrap.querySelector('#pwa-x').addEventListener('click',function(){hint.classList.remove('show');});

  function show(){wrap.classList.add('show');}
  function hide(){wrap.classList.remove('show');}

  // Android / desktop Chrome & Edge: capture the install prompt.
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferred=e;
    show();
  });
  window.addEventListener('appinstalled',function(){deferred=null;hide();});

  btn.addEventListener('click',function(){
    if(deferred){
      deferred.prompt();
      deferred.userChoice.finally(function(){deferred=null;hide();});
    }else if(isIOS){
      hint.classList.toggle('show');
    }
  });

  // iOS Safari never fires beforeinstallprompt — show the button with manual steps.
  if(isIOS)show();
})();
</script>
